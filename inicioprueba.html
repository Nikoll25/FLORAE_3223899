<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/estilosprueba/styles.css" />
  </head>
  <body>
    <div class="main">
      <!-- IZQUIERDA -->
      <div class="left">
        <img src="imagenes/logo.png" class="logo-left" />

        <h1 class="title">Florae</h1>
        <p class="subtitle">Sistema de gestión de plantas</p>

        <img src="/ImagenesJaiver/IconoSol.png" class="plant-left" />

        <p class="desc">
          conocimiento que hace
          <br> crecer tus plantas
        </p>
      </div>

      <!-- DERECHA -->
      <div class="right">
        <div class="card">
          <img src="/ImagenesJaiver/Semilla.png" class="logo" />

          <h1>Iniciar sesión</h1>
          <p>Ingresa tus credenciales para acceder<br />a tu cuenta</p>

          <input type="text" placeholder="Correo electrónico o usuario" />

          <div class="input-group">
            <input type="password" id="pwd" placeholder="Contraseña" />
          </div>

          <div class="forgot">
            <a href="#">¿Olvidaste tu contraseña?</a>
          </div>

          <button class="btn-primary">Iniciar sesión</button>

          <div class="divider">or</div>

          <button class="btn-secondary">Continuar como invitado</button>

          <div class="notice">
            El acceso esta protegido: Solo los acceños autorizados pueden
            ingresar al sistema.
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
